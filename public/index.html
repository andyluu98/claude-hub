<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Hub v4</title>
<link rel="stylesheet" href="/xterm-css/xterm.css">
<script src="/xterm/xterm.js"></script>
<script src="/xterm-fit/xterm-addon-fit.js"></script>
<script src="/xterm-search/xterm-addon-search.js"></script>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<header>
  <h1>&#x1F916; Claude Hub <span id="hdr-count" style="font-size:11px;color:var(--muted);font-weight:400;margin-left:8px">0 sessions</span></h1>
  <div id="tab-bar">
    <button data-tab="active"  class="active">&#x1F525; Active <span class="cnt" id="cnt-active">0</span></button>
    <button data-tab="pending">&#x23F8; Pending <span class="cnt" id="cnt-pending">0</span></button>
    <button data-tab="done">&#x2705; Done <span class="cnt" id="cnt-done">0</span></button>
  </div>
  <div style="flex:1"></div>
  <div id="controls" style="display:flex;align-items:center;gap:8px">
    <input id="inp-name" type="text" placeholder="Session name..." style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:12px;outline:none;width:120px">
    <button id="btn-cwd" class="btn btn-ghost" style="padding:5px 10px;font-size:12px" title="Choose working directory">&#x1F4C1; (home)</button>
    <label class="chk"><input type="checkbox" id="chk-auto" checked> &#x26A1; Auto-accept</label>
    <select id="sel-engine" title="Select AI Engine" style="background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;outline:none;cursor:pointer">
      <option value="claude">Claude</option>
      <option value="gemini">Gemini</option>
      <option value="codex">Codex</option>
    </select>
    <button class="btn btn-primary" onclick="newSession()">+ New Session</button>
    <button class="btn btn-primary" onclick="resumeAll()" title="Restart all stopped sessions">&#x25B6; Resume All</button>
    <button class="btn btn-ghost" onclick="killAll()">Stop All</button>
    <button class="btn btn-ghost" onclick="resetLayout()" title="Auto-rearrange sessions">&#x1F6F0; Auto-layout</button>
    <div style="display:flex;align-items:center;gap:3px;margin-left:4px">
      <button class="btn btn-ghost" style="padding:5px 8px;font-size:11px;font-weight:700" onclick="changeFontSize(-1)">A−</button>
      <span id="btn-font-size" style="font-size:11px;color:var(--muted);min-width:28px;text-align:center"></span>
      <button class="btn btn-ghost" style="padding:5px 8px;font-size:11px;font-weight:700" onclick="changeFontSize(1)">A+</button>
    </div>
    <button class="btn btn-ghost" id="btn-notify" onclick="toggleNotifications()">&#x1F514;</button>
  </div>
  <button id="btn-theme" title="Toggle light/dark theme" onclick="applyTheme()" style="margin-left:8px">&#x2600;</button>
  <div id="ws-badge" style="margin-left:8px">&#x25CF; ...</div>
  </header>
  <div id="main">
  <div id="workspace">
    <aside id="sidebar" class="collapsed">
      <div class="sb-toggle" onclick="toggleSidebar()" title="Toggle file explorer">&#x1F4C1;</div>
      <div class="sb-inner">
        <div class="sb-header">
          <span class="sb-title">Explorer</span>
          <button id="sb-delete-selected" onclick="sbDeleteSelected()" title="Delete selected" disabled>&#x1F5D1; <span id="sb-sel-count">0</span></button>
          <button onclick="sbRefresh()" title="Refresh">&#x27F3;</button>
        </div>
        <div class="sb-nav">
          <button id="sb-back" onclick="sbGoBack()" title="Back">&#x2190;</button>
          <button id="sb-fwd" onclick="sbGoForward()" title="Forward">&#x2192;</button>
          <button onclick="sbGoHome()" title="Home">&#x1F3E0;</button>
          <div class="sb-addr">
            <input id="sb-path-input" placeholder="Path..." onkeydown="if(event.key==='Enter'){sbBrowse(this.value.trim());this.blur();}" />
          </div>
        </div>
        <div class="sb-list" id="sb-list"></div>
      </div>
      <div class="sb-resize-handle" id="sb-resize-handle"></div>
    </aside>
    <div id="canvas">
      <div class="drop-overlay" id="canvas-drop-overlay"><span class="drop-label">&#x1F4E5; Drop files into terminal</span></div>
      <div id="empty" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center">
        <div>
          <h2 style="color:var(--text);margin-bottom:6px;font-size:18px">No sessions yet</h2>
          <p>Click "+ New Session" to start</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="folder-pop"></div>
<div id="ctx-menu"></div>

<!-- Folder picker modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <h3>&#x1F4C1; Choose working directory</h3>
      <button class="btn btn-ghost" onclick="closeModal()" style="padding:5px 11px">&times;</button>
    </div>
    <div class="modal-paste">
      <input id="inp-paste" type="text" placeholder="Paste path here (e.g. C:\Users\YourName\Projects\myapp)..." />
      <button class="btn btn-primary" onclick="goToPasted()">&#x2192; Go</button>
    </div>
    <div class="modal-path" id="modal-path">...</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="browseFs('Drives')">&#x1F4BB; Drives</button>
      <button class="btn btn-ghost" onclick="goUp()">&#x2B06; Up</button>
      <div style="flex:1"></div>
      <button class="btn btn-primary" onclick="pickCurrent()">&#x2713; Select this folder</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/js/state.js"></script>
<script src="/js/layout.js"></script>
<script src="/js/control-ws.js"></script>
<script src="/js/file-drop.js"></script>
<script src="/js/pane.js"></script>
<script src="/js/notify-broadcast.js"></script>
<script src="/js/notes-export.js"></script>
<script src="/js/presets.js"></script>
<script src="/js/search.js"></script>
<script src="/js/tags.js"></script>
<script src="/js/templates.js"></script>
<script src="/js/term-reconnect.js"></script>
<script src="/js/folder-picker.js"></script>
<script src="/js/actions.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
