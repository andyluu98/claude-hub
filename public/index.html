<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Hub v4</title>
<link rel="stylesheet" href="/xterm-css/xterm.css">
<script src="/xterm/xterm.js"></script>
<script src="/xterm-fit/xterm-addon-fit.js"></script>
<script src="/xterm-search/xterm-addon-search.js"></script>
<style>
:root {
  --bg:#07090d; --bg2:#0d1117; --panel:rgba(22,27,34,.85); --panel-solid:#161b22;
  --border:#262c36; --border-strong:#3a4150; --text:#e6edf3; --text-dim:#b1bac4; --muted:#6e7681;
  --green:#3fb950; --red:#f85149; --blue:#58a6ff; --blue-dim:#388bfd; --orange:#e3b341; --purple:#a371f7;
  --accent:linear-gradient(135deg,#58a6ff 0%, #a371f7 100%);
  --shadow-md:0 4px 12px rgba(0,0,0,.35);
  --shadow-lg:0 12px 32px rgba(0,0,0,.5);
  --radius:10px;
}
[data-theme="light"] {
  --bg:#f6f8fa; --bg2:#ffffff;
  --panel:rgba(246,248,250,.95); --panel-solid:#ffffff;
  --border:#d0d7de; --border-strong:#afb8c1;
  --text:#1f2328; --text-dim:#424a53; --muted:#6e7781;
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
  --shadow-lg:0 12px 32px rgba(0,0,0,.15);
}
[data-theme="light"] body {
  background:
    radial-gradient(at 80% 0%, rgba(163,113,247,.04), transparent 50%),
    radial-gradient(at 0% 100%, rgba(88,166,255,.03), transparent 50%),
    var(--bg);
}
[data-theme="light"] #canvas {
  background:
    radial-gradient(circle, rgba(0,0,0,.04) 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg);
}
[data-theme="light"] .pane { background:rgba(255,255,255,.98); }
[data-theme="light"] .pane-body { background:#ffffff; }
[data-theme="light"] .pane-head {
  background:linear-gradient(180deg, rgba(246,248,250,.98), rgba(240,243,246,.95));
}
[data-theme="light"] ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); background-clip:padding-box; }
[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.25); background-clip:padding-box; }
[data-theme="light"] #bar input { background:rgba(220,225,232,.85); color:var(--text); }
[data-theme="light"] #bar input:focus { background:#fff; }
[data-theme="light"] #btn-cwd { background:rgba(220,225,232,.85); color:var(--text); }
[data-theme="light"] #btn-cwd:hover { background:rgba(220,225,232,1); }
[data-theme="light"] .btn-ghost { background:rgba(0,0,0,.07); color:var(--text-dim); border-color:var(--border); }
[data-theme="light"] .btn-ghost:hover { background:rgba(0,0,0,.12); border-color:var(--border-strong); }
[data-theme="light"] .pane-head .nm:hover { background:rgba(0,0,0,.07); }
[data-theme="light"] .pane-head .nm-input { background:#fff; color:var(--text); }
[data-theme="light"] .pane-head button:hover { background:rgba(0,0,0,.07); color:var(--text); }
[data-theme="light"] .pane-head button[data-remove]:hover { color:var(--red); background:rgba(248,81,73,.1); }
[data-theme="light"] #sidebar .sb-nav button { background:rgba(0,0,0,.05); border-color:var(--border); color:var(--text-dim); }
[data-theme="light"] #sidebar .sb-nav button:hover { background:rgba(88,166,255,.08); }
[data-theme="light"] #sidebar .sb-row:hover { background:rgba(0,0,0,.05); color:var(--text); }
[data-theme="light"] .modal-paste { background:rgba(220,225,232,.45); }
[data-theme="light"] .modal-paste input { background:#fff; border-color:var(--border); }
[data-theme="light"] .modal-path { background:rgba(220,225,232,.4); }
[data-theme="light"] .modal-foot { background:rgba(220,225,232,.35); }
[data-theme="light"] #btn-theme:hover { background:rgba(0,0,0,.07); }
* { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body {
  background:
    radial-gradient(at 80% 0%, rgba(163,113,247,.08), transparent 50%),
    radial-gradient(at 0% 100%, rgba(88,166,255,.06), transparent 50%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif;
  font-size:13.5px;
  -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; overflow:hidden;
  letter-spacing:-.005em;
}
header {
  display:flex; align-items:center; gap:12px;
  padding:0 18px;
  height:44px;
  background:var(--panel);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
header h1 {
  font-size:14px; font-weight:650; letter-spacing:-.01em;
  background:var(--accent); -webkit-background-clip:text;
  background-clip:text; color:transparent;
  display:flex; align-items:center; gap:8px;
  white-space:nowrap;
}
header h1::before {
  content:''; display:inline-block; width:7px; height:7px; border-radius:50%;
  background:var(--accent); box-shadow:0 0 10px rgba(163,113,247,.6);
}
header h1 span { color:var(--muted); font-weight:400; font-size:11px; -webkit-text-fill-color:var(--muted); }
#ws-badge {
  padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600;
  background:rgba(110,118,129,.15); color:var(--muted);
  border:1px solid var(--border);
  display:flex; align-items:center; gap:5px;
  white-space:nowrap;
}
#ws-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--muted); }
#ws-badge.ok { background:rgba(63,185,80,.12); color:var(--green); border-color:rgba(63,185,80,.3); }
#ws-badge.ok::before { background:var(--green); box-shadow:0 0 8px var(--green); }
#btn-theme {
  background:transparent; border:1px solid var(--border);
  color:var(--muted); padding:4px 9px; border-radius:7px;
  cursor:pointer; font-size:14px; transition:all .15s; line-height:1;
}
#btn-theme:hover { color:var(--text); border-color:var(--border-strong); background:rgba(255,255,255,.06); }

#bar {
  display:flex; gap:8px; align-items:center;
  padding:7px 18px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap; flex-shrink:0;
  background:var(--panel);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  position:relative;
}
#bar input {
  background:rgba(13,17,23,.6);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:7px;
  padding:7px 12px;
  font-size:13px;
  outline:none;
  transition:all .15s;
  font-family:inherit;
}
#bar input:focus { border-color:var(--blue); background:rgba(13,17,23,.9); box-shadow:0 0 0 3px rgba(88,166,255,.1); }
[data-theme="light"] #bar input:focus { background:#fff; border-color:var(--blue); }
#bar input::placeholder { color:var(--muted); }
#inp-name { width:140px; }
#btn-cwd {
  background:rgba(13,17,23,.6);
  color:var(--text);
  padding:7px 12px;
  border-radius:7px;
  border:1px solid var(--border);
  cursor:pointer; max-width:300px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  font-size:12px;
  transition:all .15s;
  display:flex; align-items:center; gap:6px;
  font-family:inherit;
}
#btn-cwd:hover { border-color:var(--blue); background:rgba(88,166,255,.08); }
.chk {
  display:flex; align-items:center; gap:7px;
  color:var(--orange); cursor:pointer; font-size:12px; user-select:none;
  padding:6px 10px; border-radius:7px;
  background:rgba(227,179,65,.08);
  border:1px solid rgba(227,179,65,.2);
  font-weight:500;
}
.chk:hover { background:rgba(227,179,65,.14); }
.chk input { width:14px; height:14px; accent-color:var(--orange); }
.btn {
  padding:7px 14px; border-radius:7px; border:1px solid transparent;
  cursor:pointer; font-size:12.5px; font-weight:600; white-space:nowrap;
  transition:all .15s; font-family:inherit;
}
.btn:hover { transform:translateY(-1px); box-shadow:var(--shadow-md); }
.btn:active { transform:translateY(0); }
.btn-primary { background:var(--accent); color:#fff; }
.btn-danger  { background:linear-gradient(135deg,#f85149,#da3633); color:#fff; }
.btn-ghost   { background:rgba(110,118,129,.12); color:var(--text); border-color:var(--border); }
.btn-ghost:hover { background:rgba(110,118,129,.2); border-color:var(--border-strong); }
.btn-purple  { background:rgba(163,113,247,.15); color:var(--purple); border-color:rgba(163,113,247,.3); }
.btn-purple:hover { background:rgba(163,113,247,.25); }


/* Main workspace */
#main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#workspace { flex:1; display:flex; flex-direction:row; overflow:hidden; min-height:0; }

/* Sidebar: file explorer for active session */
#sidebar {
  width:300px; min-width:180px; max-width:60vw; flex-shrink:0; background:var(--panel-solid);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
  overflow:hidden; transition:width .2s; position:relative;
}
#sidebar.resizing { transition:none; user-select:none; }
#sidebar.collapsed { width:40px; min-width:40px; }
#sidebar.collapsed .sb-inner { display:none; }
#sidebar.collapsed .sb-resize-handle { display:none; }
#sidebar.drop-target { outline:2px dashed var(--blue); outline-offset:-4px; background:rgba(88,166,255,.06); }
#sidebar .sb-resize-handle {
  position:absolute; top:0; right:0; width:6px; height:100%;
  cursor:col-resize; z-index:20; background:transparent;
}
#sidebar .sb-resize-handle:hover, #sidebar .sb-resize-handle.dragging {
  background:var(--blue); box-shadow:0 0 6px rgba(88,166,255,.4);
}
#sidebar .sb-toggle {
  height:36px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; border-bottom:1px solid var(--border); color:var(--muted);
  font-size:14px; flex-shrink:0;
}
#sidebar .sb-toggle:hover { color:var(--blue); background:rgba(88,166,255,.05); }
#sidebar .sb-inner { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#sidebar .sb-header {
  padding:8px 10px; border-bottom:1px solid var(--border); font-size:11px;
  display:flex; align-items:center; justify-content:space-between;
}
#sidebar .sb-header .sb-title { color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
#sidebar .sb-nav { padding:5px 10px; border-bottom:1px solid var(--border); display:flex; gap:3px; align-items:center; }
#sidebar .sb-nav button { background:rgba(255,255,255,.06); border:1px solid var(--border); color:var(--text-dim); border-radius:4px; padding:2px 6px; cursor:pointer; font-size:11px; line-height:1; transition:all .12s; flex-shrink:0; }
#sidebar .sb-nav button:hover { color:var(--blue); border-color:var(--blue); background:rgba(88,166,255,.08); }
#sidebar .sb-nav button:disabled { opacity:.3; cursor:default; }
#sidebar .sb-nav button:disabled:hover { color:var(--text-dim); border-color:var(--border); background:rgba(255,255,255,.06); }
/* Address bar: breadcrumb overlay on input */
#sidebar .sb-addr { flex:1; min-width:0; position:relative; }
#sidebar .sb-addr input { width:100%; background:var(--bg2); border:1px solid var(--border); color:transparent; padding:3px 7px; border-radius:4px; font-size:10px; font-family:Consolas,monospace; outline:none; }
#sidebar .sb-addr input:focus { border-color:var(--blue); z-index:2; position:relative; color:var(--text); }
#sidebar .sb-addr .sb-crumb { position:absolute; inset:0; display:flex; align-items:center; gap:2px; padding:0 7px; pointer-events:auto; overflow:hidden; white-space:nowrap; font-size:10.5px; background:var(--bg2); border-radius:4px; }
#sidebar .sb-addr input:focus + .sb-crumb { display:none; }
#sidebar .sb-addr .sb-crumb span { cursor:pointer; color:var(--blue); padding:1px 3px; border-radius:3px; flex-shrink:0; }
#sidebar .sb-addr .sb-crumb span:hover { background:rgba(88,166,255,.15); }
#sidebar .sb-addr .sb-crumb .sep { color:var(--muted); cursor:default; padding:1px 1px; flex-shrink:0; }
#sidebar .sb-addr .sb-crumb .sep:hover { background:none; }
#sidebar .sb-list { flex:1; overflow-y:auto; padding:4px 0; }
#sidebar .sb-row {
  display:flex; align-items:center; gap:8px; padding:5px 12px; cursor:pointer;
  font-size:12px; color:var(--text-dim); user-select:none;
}
#sidebar .sb-row:hover { background:rgba(255,255,255,.04); color:var(--text); }
#sidebar .sb-row .sb-icon { font-size:13px; width:16px; text-align:center; flex-shrink:0; }
#sidebar .sb-row .sb-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#sidebar .sb-row .sb-size { color:var(--muted); font-size:10px; flex-shrink:0; }
#sidebar .sb-row input[type="checkbox"] { cursor:pointer; accent-color:var(--blue); }
#sidebar .sb-row.checked { background:rgba(88,166,255,.1); color:var(--blue); }
#sidebar .sb-selected {
  border-top:1px solid var(--border); padding:8px 12px; font-size:11px;
  background:rgba(88,166,255,.04); max-height:120px; overflow-y:auto;
}
#sidebar .sb-selected .sb-sel-label { color:var(--muted); margin-bottom:4px; }
#sidebar .sb-selected .sb-sel-item { color:var(--blue); font-family:Consolas,monospace; font-size:10px; }
#sidebar .sb-empty { padding:30px 12px; text-align:center; color:var(--muted); font-size:11px; }

/* Drag & drop overlay */
.drop-overlay { position:absolute; inset:0; z-index:999; pointer-events:none; display:none; }
.drop-overlay.show { display:flex; align-items:center; justify-content:center; background:rgba(88,166,255,.08); border:2px dashed var(--blue); border-radius:8px; }
.drop-overlay .drop-label { color:var(--blue); font-size:14px; font-weight:600; pointer-events:none; text-shadow:0 0 20px rgba(88,166,255,.5); }
#sidebar { position:relative; }
#canvas { position:relative; }
#overseer-pane {
  background:linear-gradient(180deg, rgba(163,113,247,.08), rgba(22,27,34,.6));
  border-bottom:1px solid rgba(163,113,247,.2);
  padding:12px 22px;
  flex-shrink:0; max-height:150px; overflow-y:auto;
  backdrop-filter:blur(10px);
}
#overseer-pane h3 {
  color:var(--purple); font-size:12px; font-weight:600; margin-bottom:8px;
  display:flex; align-items:center; gap:10px; text-transform:uppercase; letter-spacing:.05em;
}
#overseer-pane h3 .count { color:var(--muted); font-weight:400; font-size:11px; text-transform:none; letter-spacing:0; }
#overseer-rule {
  font-family:'SF Mono','JetBrains Mono',Consolas,monospace;
  font-size:11.5px; color:var(--text-dim); white-space:pre-wrap; line-height:1.65;
}
#overseer-pane.collapsed { max-height:36px; padding:8px 22px; overflow:hidden; }
#overseer-pane.collapsed #overseer-rule { display:none; }

/* Canvas + split-pane engine */
#canvas {
  flex:1; display:flex; overflow:hidden; position:relative;
  background:
    radial-gradient(circle, rgba(255,255,255,.035) 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg);
}
.split-container {
  display:flex; flex:1; min-width:0; min-height:0; overflow:hidden;
}
.split-container.dir-h { flex-direction:row; }
.split-container.dir-v { flex-direction:column; }
.split-child {
  display:flex; min-width:0; min-height:0; overflow:hidden;
}
.divider {
  flex-shrink:0; background:var(--border); transition:background .1s; position:relative; z-index:5;
}
.divider.dir-h { width:5px; cursor:col-resize; }
.divider.dir-v { height:5px; cursor:row-resize; }
.divider:hover, .divider.dragging { background:var(--blue); box-shadow:0 0 6px rgba(88,166,255,.4); }

.pane {
  display:flex; flex-direction:column; overflow:hidden;
  flex:1; min-width:200px; min-height:150px;
  background:rgba(7,9,13,.95);
  border:1px solid var(--border);
  box-shadow:var(--shadow-md);
  transition:border-color .15s, box-shadow .15s;
}
.pane:hover { border-color:var(--border-strong); }
.pane.active {
  border-color:var(--blue);
  box-shadow:0 0 0 1px var(--blue), 0 0 24px rgba(88,166,255,.2), var(--shadow-lg);
}
.pane-head {
  padding:7px 10px;
  background:linear-gradient(180deg, rgba(30,36,45,.95), rgba(22,27,34,.9));
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  flex-shrink:0; font-size:12px;
  user-select:none;
}
.pane-head .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; transition:all .2s; }
.pane-head .dot.running { background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 2s ease-in-out infinite; }
.pane-head .dot.stopped { background:var(--orange); box-shadow:0 0 6px rgba(227,179,65,.5); }
.pane-head .dot.done    { background:var(--muted); }
.pane-head .dot.error   { background:var(--red); box-shadow:0 0 8px var(--red); }
.pane.active-pane { border-color:var(--blue); box-shadow:0 0 0 2px rgba(88,166,255,.3), var(--shadow-lg); }
.pane[data-status="running"] [data-resume] { display:none; }
.pane[data-status="stopped"] [data-kill]   { display:none; }
.pane[data-status="stopped"] .pane-body    { opacity:.7; }


/* Lane buttons trong pane head */
.pane-head .lane-btns { display:flex; gap:2px; margin-left:6px; }
.pane-head .lane-btns button {
  width:22px; height:22px; padding:0; font-size:10px; font-weight:700;
  border:1px solid var(--border); background:transparent; color:var(--text-dim);
  border-radius:5px; cursor:pointer;
}
.pane-head .lane-btns button:hover { background:rgba(88,166,255,.15); color:var(--blue); }
.pane-head .lane-btns button.on {
  background:var(--blue); color:#fff; border-color:var(--blue);
  box-shadow:0 0 8px rgba(88,166,255,.5);
}

/* Tab bar — lives inside header */
#tab-bar {
  display:flex; gap:3px;
}
#tab-bar button {
  padding:5px 12px; background:transparent; color:var(--text-dim);
  border:1px solid transparent; border-radius:6px; cursor:pointer;
  font-size:12px; font-weight:600; display:flex; align-items:center; gap:6px;
  transition:all .15s;
}
#tab-bar button:hover { background:rgba(255,255,255,.06); color:var(--text); }
#tab-bar button.active {
  background:rgba(88,166,255,.15); color:var(--blue); border-color:rgba(88,166,255,.3);
}
#tab-bar button .cnt {
  background:rgba(0,0,0,.2); padding:1px 6px; border-radius:8px;
  font-size:10px; min-width:18px; text-align:center;
}
#tab-bar button.active .cnt { background:rgba(88,166,255,.2); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.55;} }

.pane-head .nm {
  font-weight:600; font-size:12.5px;
  max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  cursor:text; padding:2px 6px; border-radius:4px;
  transition:background .12s;
}
.pane-head .nm:hover { background:rgba(255,255,255,.06); }
.pane-head .nm-input {
  background:rgba(13,17,23,.9); border:1px solid var(--blue);
  color:var(--text); font-size:12.5px; font-weight:600;
  padding:2px 6px; border-radius:4px; outline:none; width:160px;
  font-family:inherit;
}
.pane-head .folder {
  color:var(--blue-dim);
  font-family:'SF Mono','JetBrains Mono',Consolas,monospace;
  font-size:10.5px;
  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  opacity:.75;
}
.pane-head .auto {
  font-size:9px; font-weight:700; color:var(--orange);
  background:rgba(227,179,65,.15); padding:2px 6px; border-radius:4px;
  border:1px solid rgba(227,179,65,.3);
  letter-spacing:.05em;
}
.pane-head button {
  background:transparent; border:none; color:var(--muted);
  cursor:pointer; padding:3px 7px; font-size:13px;
  border-radius:4px; transition:all .12s;
}
.pane-head button:hover { color:var(--text); background:rgba(255,255,255,.08); }
.pane-head button[data-remove] {
  color:var(--red); background:rgba(248,81,73,.15);
  font-weight:bold; font-size:18px; padding:2px 12px;
  margin-right:10px; border-radius:6px;
  display:inline-flex; align-items:center; justify-content:center;
  min-width:34px; height:26px;
}
.pane-head button[data-remove]:hover { background:rgba(248,81,73,.25); color:#fff; }
.pane-body { flex:1; padding:6px; overflow:hidden; min-height:0; background:#000; position:relative; }
.pane { container-type: inline-size; container-name: pane; }
.pane-body .xterm-wrap { width:100%; height:100%; }

/* Modal — modernized */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(6px);
  display:none; align-items:center; justify-content:center; z-index:500;
  animation:fadeIn .15s;
}
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.modal-bg.show { display:flex; }
.modal {
  background:var(--panel-solid);
  border:1px solid var(--border-strong);
  border-radius:14px;
  width:720px; max-height:84vh;
  display:flex; flex-direction:column;
  box-shadow:var(--shadow-lg), 0 0 0 1px rgba(255,255,255,.03);
  overflow:hidden;
}
.modal-head {
  padding:16px 22px;
  border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(180deg, rgba(88,166,255,.05), transparent);
}
.modal-head h3 {
  font-size:15px; font-weight:650;
  background:var(--accent); -webkit-background-clip:text; background-clip:text; color:transparent;
}
.modal-paste {

// ── Split-pane layout trees ────────────────────────────────────────
var layoutTrees = { active: null, pending: null, done: null };
var pendingSplitTarget = null; // { sid, dir, lane } set before newSession()

function saveLayoutTree(lane, tree) {
  layoutTrees[lane] = tree;
  try { localStorage.setItem('layoutTree-' + lane, JSON.stringify(tree)); } catch(_){}
}
function loadSavedLayoutTrees() {
  ['active','pending','done'].forEach(function(lane) {
    try {
      var s = localStorage.getItem('layoutTree-' + lane);
      if (s) layoutTrees[lane] = JSON.parse(s);
    } catch(_){}
  });
}
function swapLeaves(node, sidA, sidB) {
  var leafA = findLeaf(node, sidA);
  var leafB = findLeaf(node, sidB);
  if (leafA && leafB) { leafA.sessionId = sidB; leafB.sessionId = sidA; }
}
function findLeaf(node, sid) {
  if (!node) return null;
  if (node.type === 'leaf') return node.sessionId === sid ? node : null;
  return findLeaf(node.children[0], sid) || findLeaf(node.children[1], sid);
}
function getLastLeafSid(node) {
  if (!node) return null;
  if (node.type === 'leaf') return node.sessionId;
  return getLastLeafSid(node.children[1]) || getLastLeafSid(node.children[0]);
}
function getAllLeafSids(node, out) {
  if (!node) return out;
  out = out || [];
  if (node.type === 'leaf') { out.push(node.sessionId); return out; }
  getAllLeafSids(node.children[0], out);
  getAllLeafSids(node.children[1], out);
  return out;
}
function splitTreeAt(tree, targetSid, newSid, dir) {
  if (!tree) return { type:'leaf', sessionId: newSid };
  if (tree.type === 'leaf') {
    if (tree.sessionId !== targetSid) return tree;
    return { type:'split', dir:dir, ratio:0.5, children:[
      { type:'leaf', sessionId: targetSid },
      { type:'leaf', sessionId: newSid }
    ]};
  }
  return { type:'split', dir:tree.dir, ratio:tree.ratio, children:[
    splitTreeAt(tree.children[0], targetSid, newSid, dir),
    splitTreeAt(tree.children[1], targetSid, newSid, dir)
  ]};
}
function removeFromTree(tree, sid) {
  if (!tree) return null;
  if (tree.type === 'leaf') return tree.sessionId === sid ? null : tree;
  var a = removeFromTree(tree.children[0], sid);
  var b = removeFromTree(tree.children[1], sid);
  if (!a && !b) return null;
  if (!a) return b;
  if (!b) return a;
  return { type:'split', dir:tree.dir, ratio:tree.ratio, children:[a, b] };
}
function reconcileTree(tree, validIds) {
  if (!tree) return null;
  if (tree.type === 'leaf') return validIds.indexOf(tree.sessionId) >= 0 ? tree : null;
  var a = reconcileTree(tree.children[0], validIds);
  var b = reconcileTree(tree.children[1], validIds);
  if (!a && !b) return null;
  if (!a) return b;
  if (!b) return a;
  return { type:'split', dir:tree.dir, ratio:tree.ratio, children:[a, b] };
}
function addSidToTree(tree, newSid, splitSid, dir) {
  var target = splitSid || getLastLeafSid(tree);
  if (!target) return { type:'leaf', sessionId: newSid };
  return splitTreeAt(tree, target, newSid, dir || 'h');
}

// ── renderTree + divider drag ──────────────────────────────────────
function fitSubtree(node) {
  if (!node) return;
  if (node.type === 'leaf') {
    var p = panes[node.sessionId];
    if (p && p.opened) { try { p.fit.fit(); } catch(_){} }
  } else {
    fitSubtree(node.children[0]);
    fitSubtree(node.children[1]);
  }
}
function openAndFitSubtree(node) {
  if (!node) return;
  if (node.type === 'leaf') {
    var p = panes[node.sessionId];
    if (!p) return;
    if (!p.opened) {
      var termEl = document.getElementById('term-' + node.sessionId);
      if (termEl) { p.term.open(termEl); p.opened = true; }
    }
    if (p.opened) { try { p.fit.fit(); } catch(_){} }
  } else {
    openAndFitSubtree(node.children[0]);
    openAndFitSubtree(node.children[1]);
  }
}
function makeDividerDraggable(divider, node, wrapA, container, isH) {
  divider.addEventListener('mousedown', function(e) {
    e.preventDefault();
    divider.classList.add('dragging');
    var startPos = isH ? e.clientX : e.clientY;
    function onMove(ev) {
      var totalSize = isH ? container.offsetWidth : container.offsetHeight;
      if (totalSize < 10) return;
      var delta = (isH ? ev.clientX : ev.clientY) - startPos;
      startPos = isH ? ev.clientX : ev.clientY;
      var newRatio = node.ratio + delta / totalSize;
      newRatio = Math.max(0.1, Math.min(0.9, newRatio));
      node.ratio = newRatio;
      wrapA.style.flex = '0 0 calc(' + (newRatio * 100) + '% - 3px)';
      fitSubtree(node.children[0]);
      fitSubtree(node.children[1]);
    }
    function onUp() {
      divider.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      saveLayoutTree(currentTab, layoutTrees[currentTab]);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
function renderTree(node, el) {
  if (!node) return;
  if (node.type === 'leaf') {
    var p = panes[node.sessionId];
    if (!p) return;
    p.el.style.flex = '1';
    p.el.style.minWidth = '0';
    p.el.style.minHeight = '0';
    el.appendChild(p.el);
    p.el.classList.remove('zoomed');
    p.el.style.maxWidth = '';
  } else {
    var isH = node.dir === 'h';
    var container = document.createElement('div');
    container.className = 'split-container dir-' + node.dir;
    el.appendChild(container);
    var wrapA = document.createElement('div');
    wrapA.className = 'split-child';
    wrapA.style.flex = '0 0 calc(' + (node.ratio * 100) + '% - 3px)';
    container.appendChild(wrapA);
    renderTree(node.children[0], wrapA);
    var divider = document.createElement('div');
    divider.className = 'divider dir-' + node.dir;
    container.appendChild(divider);
    var wrapB = document.createElement('div');
    wrapB.className = 'split-child';
    wrapB.style.flex = '1';
    container.appendChild(wrapB);
    renderTree(node.children[1], wrapB);
    makeDividerDraggable(divider, node, wrapA, container, isH);
  }
}
function rebuildCanvas() {
  var canvas = document.getElementById('canvas');
  var dropOverlay = document.getElementById('canvas-drop-overlay');
  // Detach pane elements so terminals survive the canvas clear
  Object.values(panes).forEach(function(p) {
    if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
  });
  // Clear canvas without destroying detached pane elements
  while (canvas.firstChild) canvas.removeChild(canvas.firstChild);
  if (dropOverlay) canvas.appendChild(dropOverlay);
  var tree = layoutTrees[currentTab];
  if (!tree) { updateEmpty(); return; }
  var emptyEl = document.getElementById('empty');
  if (emptyEl) emptyEl.remove();

  // Filter mode: bypass tree, show flat list of matching panes
  if (sessionFilter) {
    zoomedSid = null;
    var matchSids = getAllLeafSids(tree, []).filter(function(sid) {
      var s = state[sid];
      if (!s) return false;
      return (s.name || '').toLowerCase().indexOf(sessionFilter) >= 0 ||
             (s.cwd  || '').toLowerCase().indexOf(sessionFilter) >= 0 ||
             (sessionTags[sid] || []).some(function(t) { return t.indexOf(sessionFilter) >= 0; });
    });
    if (!matchSids.length) {
      var noMatch = document.createElement('div');
      noMatch.id = 'empty';
      noMatch.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center';
      noMatch.innerHTML = '<div><h2 style="color:var(--text);margin-bottom:6px;font-size:18px">No matching sessions</h2><p>No sessions match "' + sessionFilter + '"</p></div>';
      canvas.appendChild(noMatch);
      return;
    }
    canvas.style.flexWrap = 'wrap';
    matchSids.forEach(function(sid) {
      var mp = panes[sid];
      if (!mp) return;
      mp.el.classList.remove('zoomed');
      mp.el.style.flex = '1 1 400px';
      mp.el.style.minWidth = '200px';
      mp.el.style.minHeight = '150px';
      mp.el.style.maxWidth = '100%';
      canvas.appendChild(mp.el);
    });
    requestAnimationFrame(function() {
      matchSids.forEach(function(sid) {
        openAndFitSubtree({ type: 'leaf', sessionId: sid });
      });
    });
    return;
  }

  // If a pane is zoomed and it belongs to this lane, show only that pane
  if (zoomedSid && panes[zoomedSid] && findLeaf(tree, zoomedSid)) {
    canvas.style.flexWrap = '';
    var zp = panes[zoomedSid];
    zp.el.classList.add('zoomed');
    zp.el.style.flex = '1';
    zp.el.style.minWidth = '0';
    zp.el.style.minHeight = '0';
    canvas.appendChild(zp.el);
    requestAnimationFrame(function() {
      openAndFitSubtree({ type: 'leaf', sessionId: zoomedSid });
    });
  } else {
    canvas.style.flexWrap = '';
    if (zoomedSid) zoomedSid = null; // zoomed pane not in current lane — clear zoom
    renderTree(tree, canvas);
    requestAnimationFrame(function() { openAndFitSubtree(tree); });
  }
}

// ── Control WebSocket ─────────────────────────────────────────────
function connectCtrl() {
  ctrlWs = new WebSocket('ws://' + location.host + '/');
  ctrlWs.onopen = function() {
    var b = document.getElementById('ws-badge');
    b.textContent = 'Connected';
    b.className = 'ok';
    retryCount = 0;
  };
  ctrlWs.onclose = function() {
    var b = document.getElementById('ws-badge');
    b.textContent = 'Disconnected...';
    b.className = '';
    setTimeout(connectCtrl, Math.min(5000, 1000 * ++retryCount));
  };
  ctrlWs.onerror = function() { ctrlWs.close(); };
  ctrlWs.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      msg.sessions.forEach(function(s) { state[s.id] = s; prevStatus[s.id] = s.status; });
      rebuildGrid();
    } else if (msg.type === 'session_created') {
      state[msg.session.id] = msg.session;
      prevStatus[msg.session.id] = msg.session.status;
      addPane(msg.session);
    } else if (msg.type === 'session_update') {
      var prev = prevStatus[msg.session.id];
      state[msg.session.id] = msg.session;
      var nw = msg.session.status;
      if (prev === 'running' && (nw === 'idle' || nw === 'done')) {
        notifySessionChange(msg.session.id, nw);
      }
      prevStatus[msg.session.id] = nw;
      updatePaneHead(msg.session.id);
    } else if (msg.type === 'session_removed') {
      delete state[msg.id];
      delete prevStatus[msg.id];
      removePane(msg.id);
    }
    document.getElementById('hdr-count').textContent = Object.keys(state).length + ' sessions';
    try { updateTabCounts(); } catch(_){}
  };
}

// ── Pane management (split-pane) ────────────────────────────────
function rebuildGrid() {
  // Diff: remove panes for sessions no longer in state
  Object.keys(panes).forEach(function(sid) {
    if (!state[sid]) {
      var p = panes[sid];
      try { p.ws.close(); } catch(_){}
      try { p.term.dispose(); } catch(_){}
      if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
      delete panes[sid];
      if (zoomedSid === sid) zoomedSid = null;
      ['active','pending','done'].forEach(function(lane) {
        layoutTrees[lane] = removeFromTree(layoutTrees[lane], sid);
      });
    }
  });
  // Create panes for new sessions; update head for existing ones
  Object.values(state).forEach(function(s) {
    if (panes[s.id]) { updatePaneHead(s.id); }
    else { createPaneElement(s); }
  });
  // Reconcile layout trees per lane
  loadSavedLayoutTrees();
  ['active','pending','done'].forEach(function(lane) {
    var validIds = Object.values(state)
      .filter(function(s) { return (s.lane || 'active') === lane; })
      .map(function(s) { return s.id; });
    var tree = reconcileTree(layoutTrees[lane], validIds);
    validIds.forEach(function(sid) {
      if (!findLeaf(tree, sid)) {
        tree = addSidToTree(tree, sid, getLastLeafSid(tree), 'h');
      }
    });
    saveLayoutTree(lane, tree);
  });
  rebuildCanvas();
}

// Paste from clipboard: image (save to file, send @path) or text


function isFileDrag(e) {
  var dt = e && e.dataTransfer;
  if (!dt) return false;
  if (dt.types) {
    for (var i = 0; i < dt.types.length; i++) {
      if (dt.types[i] === 'Files') return true;
    }
  }
  return !!(dt.files && dt.files.length);
}

function readDroppedFiles(files) {
  return Promise.all(Array.prototype.slice.call(files || []).map(function(file) {
    return new Promise(function(resolve, reject) {
      if (file.path) { resolve({ name: file.name || file.path.split(/[\\/]/).pop(), path: file.path }); return; }
      var reader = new FileReader();
      reader.onload = function() { resolve({ name: file.name || 'dropped-file', data: reader.result }); };
      reader.onerror = function() { reject(reader.error || new Error('read failed')); };
      reader.readAsDataURL(file);
    });
  }));
}

function sendPathTokensToTerminal(paths, sid) {
  var p = panes[sid];
  var sObj = state[sid];
  if (!p || !p.ws || p.ws.readyState !== 1) return false;
  paths.forEach(function(fp) {
    var rel = relOrAbs(fp, sObj ? sObj.cwd : '');
    var ref = /\s/.test(rel) ? '"' + rel + '"' : rel;
    p.ws.send('@' + ref + ' ');
  });
  return true;
}

function uploadDroppedFiles(files, mode, dir) {
  return readDroppedFiles(files).then(function(items) {
    var existingPaths = items.filter(function(it) { return it.path; }).map(function(it) { return it.path; });
    var uploads = items.filter(function(it) { return it.data; });
    if (!uploads.length) return { ok:true, files: existingPaths.map(function(fp) { return { path: fp, name: fp.split(/[\\/]/).pop() }; }) };
    return fetch('/api/drop-files', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ mode: mode, dir: dir, files: uploads }),
    }).then(function(r) { return r.json(); }).then(function(j) {
      if (!j.ok) return j;
      j.files = existingPaths.map(function(fp) { return { path: fp, name: fp.split(/[\\/]/).pop() }; }).concat(j.files || []);
      return j;
    });
  });
}

function sendDroppedFilesToTerminal(files, sid) {
  if (!files || !files.length) return;
  uploadDroppedFiles(files, 'temp').then(function(j) {
    if (!j.ok) { toast('Drop error: ' + (j.error || 'unknown')); return; }
    var paths = (j.files || []).map(function(f) { return f.path; });
    if (sendPathTokensToTerminal(paths, sid)) toast('Sent ' + paths.length + ' file(s) to terminal');
  }).catch(function(e) { toast('Drop error: ' + e.message); });
}

function getSidebarDropDir(target) {
  var dirRow = target && target.closest && target.closest('[data-sb-dir]');
  if (dirRow) return dirRow.dataset.sbDir;
  return sbCurrentPath;
}

function dropFilesToSidebar(files, target) {
  if (!files || !files.length) return;
  var dir = getSidebarDropDir(target);
  if (!dir) { toast('Open a folder in Explorer first'); return; }
  uploadDroppedFiles(files, 'folder', dir).then(function(j) {
    if (!j.ok) { toast('Drop error: ' + (j.error || 'unknown')); return; }
    toast('Copied ' + (j.files || []).length + ' file(s) to folder');
    sbBrowse(dir, true);
  }).catch(function(e) { toast('Drop error: ' + e.message); });
}

function pasteFromClipboard(ws, sid) {
  if (!navigator.clipboard) { toast('Clipboard API not available'); return; }
  // Try read clipboard items (image + text)
  if (navigator.clipboard.read) {
    navigator.clipboard.read().then(function(clipItems) {
      for (var ci = 0; ci < clipItems.length; ci++) {
        var types = clipItems[ci].types;
        for (var ti = 0; ti < types.length; ti++) {
          if (types[ti].indexOf('image') !== -1) {
            clipItems[ci].getType(types[ti]).then(function(blob) {
              var reader = new FileReader();
              reader.onload = function() {
                var s = state[sid];
                fetch('/api/paste-image', {
                  method:'POST', headers:{'Content-Type':'application/json'},
                  body: JSON.stringify({ data: reader.result, cwd: s ? s.cwd : '' })
                }).then(function(r){return r.json();}).then(function(j) {
                  if (j.ok && ws.readyState === 1) { ws.send('@' + j.path + ' '); toast('Pasted image: ' + j.name); }
                  else if (!j.ok) toast('Error: ' + (j.error||''));
                });
              };
              reader.readAsDataURL(blob);
            });
            return;
          }
        }
      }
      // No image found, paste text
      pasteTextFromClipboard(ws);
    }).catch(function() { pasteTextFromClipboard(ws); });
  } else {
    pasteTextFromClipboard(ws);
  }
}
function pasteTextFromClipboard(ws) {
  if (!navigator.clipboard || !navigator.clipboard.readText) return;
  navigator.clipboard.readText().then(function(text) {
    if (!text) return;
    var CR = String.fromCharCode(13), LF = String.fromCharCode(10);
    text = text.split(CR + LF).join(LF).split(CR).join(LF);
    if (ws.readyState === 1) ws.send(text);
  }).catch(function(err) { toast('Paste error: ' + err.message); });
}

    '<div class="pane-body"><div class="xterm-wrap" id="term-' + s.id + '"></div></div>';

  var termTheme = currentTheme === 'light' ? TERM_THEME_LIGHT : TERM_THEME_DARK;
  var term = new Terminal({
    fontFamily: 'Consolas, "Courier New", monospace',
    fontSize: termFontSize,
    theme: termTheme,
    cursorBlink: true, scrollback: 5000, allowProposedApi: true,
  });
  var fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  var search = null;
  try {
    if (typeof SearchAddon !== 'undefined') {
      search = new SearchAddon.SearchAddon();
      term.loadAddon(search);
    }
  } catch(_){}
  // term.open() is deferred until the pane element is in the real DOM (see openAndFitSubtree)

  var ws = new WebSocket('ws://' + location.host + '/term/' + s.id);
  ws.binaryType = 'arraybuffer';
  ws.onmessage = function(e) {
    if (e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data));
    else term.write(e.data);
  };
  ws.onopen = function() {
    var pp = panes[s.id];
    if (!pp) return;
    pp.reconnectAttempt = 0;
    hideTermOverlay(s.id);
    setTimeout(function() {
      var pp2 = panes[s.id];
      if (pp2 && pp2.opened) {
        try { pp2.fit.fit(); pp2.ws.send(JSON.stringify({ type:'resize', cols:term.cols, rows:term.rows })); } catch(_){}
      }
    }, 100);
  };
  ws.onclose = function() { scheduleTermReconnect(s.id); };
  ws.onerror = function() { ws.close(); };
  term.onData(function(d) {
    var pp = panes[s.id];
    if (pp && pp.ws && pp.ws.readyState === 1) pp.ws.send(d);
  });
  term.onResize(function(sz) {
    var pp = panes[s.id];
    if (pp && pp.ws && pp.ws.readyState === 1) pp.ws.send(JSON.stringify({ type:'resize', cols:sz.cols, rows:sz.rows }));
  });

  term.attachCustomKeyEventHandler(function(ev) {
    if (ev.type !== 'keydown') return true;
    if (ev.ctrlKey && !ev.shiftKey && (ev.key === 'f' || ev.key === 'F')) {
      ev.preventDefault();
      openSearchBar(s.id);
      return false;
    }
    if (ev.ctrlKey && (ev.key === 'c' || ev.key === 'C') && !ev.shiftKey) {
      var sel = term.getSelection();
      if (sel && sel.length > 0) {
        ev.preventDefault();
        navigator.clipboard.writeText(sel).then(function() { toast('Copied ' + sel.length + ' chars'); term.clearSelection(); });
        return false;
      }
      return true;
    }
    if ((ev.key === 'Delete' || ev.key === 'Backspace') && term.hasSelection && term.hasSelection()) {
      try {
        var sp = term.getSelectionPosition && term.getSelectionPosition();
        var cur = term.buffer.active;
        var curAbsRow = cur.viewportY + cur.cursorY;
        if (sp && sp.startRow === sp.endRow && sp.startRow === curAbsRow) {
          var ws_ = panes[s.id] && panes[s.id].ws;
          if (ws_ && ws_.readyState === 1) {
            ev.preventDefault();
            var moveDx = sp.startColumn - cur.cursorX;
            sendCursorMove(ws_, term, moveDx);
            var delLen = sp.endColumn - sp.startColumn;
            if (delLen > 0 && delLen <= 500) {
              var del = '';
              for (var di = 0; di < delLen; di++) del += '\x1b[3~';
              ws_.send(del);
            }
            term.clearSelection();
            return false;
          }
        }
      } catch(_){}
      return true;
    }
    if (ev.shiftKey && ev.key === 'Enter') {
      ev.preventDefault();
      var _ws = panes[s.id] && panes[s.id].ws;
      if (_ws && _ws.readyState === 1) _ws.send(String.fromCharCode(27) + '[13;2u');
      return false;
    }
    var isPaste = (ev.ctrlKey && (ev.key === 'v' || ev.key === 'V')) || (ev.shiftKey && ev.key === 'Insert');
    if (!isPaste) return true;
    ev.preventDefault();
    pasteFromClipboard(panes[s.id] && panes[s.id].ws, s.id);
    return false;
  });

  var termEl = el.querySelector('.xterm-wrap');
  el.addEventListener('mousedown', function() {
    if (activeSid !== s.id) setActiveSession(s.id);
  });
  termEl.addEventListener('contextmenu', function(ev) { ev.preventDefault(); pasteFromClipboard(panes[s.id] && panes[s.id].ws, s.id); });
  termEl.addEventListener('auxclick', function(ev) { if (ev.button !== 1) return; ev.preventDefault(); pasteFromClipboard(panes[s.id] && panes[s.id].ws, s.id); });
  termEl.addEventListener('dragenter', function(ev) { if (isFileDrag(ev)) { ev.preventDefault(); ev.dataTransfer.dropEffect = 'copy'; } });
  termEl.addEventListener('dragover', function(ev) { if (isFileDrag(ev)) { ev.preventDefault(); ev.dataTransfer.dropEffect = 'copy'; } });
  termEl.addEventListener('drop', function(ev) {
    ev.preventDefault(); ev.stopPropagation();
    sendDroppedFilesToTerminal(ev.dataTransfer.files, s.id);
  });

  panes[s.id] = { term: term, ws: ws, fit: fit, search: search, el: el, opened: false, reconnectAttempt: 0, reconnectTimer: null };
  applyPaneColor(s.id);
  applyPaneTags(s.id);

  // Click-to-position cursor — registered AFTER term.open() inside openAndFitSubtree
  // We attach when term.opened becomes true; use a one-shot poll
  (function attachClickPos() {
    var pp = panes[s.id];
    if (!pp) return;
    if (!pp.opened || !term.element) { setTimeout(attachClickPos, 100); return; }
    if (pp._clickPosAttached) return;
    pp._clickPosAttached = true;
    term.element.addEventListener('click', function(e) {
      try {
        if (!e.altKey) return;
        if (e.detail !== 1) return;
        var mouseMode = false;
        try { mouseMode = !!(term.modes && term.modes.mouseTrackingMode && term.modes.mouseTrackingMode !== 'none'); } catch(_){}
        if (mouseMode) return;
        var dims = getCellSize(term);
        if (!dims) return;
        var rect = term.element.getBoundingClientRect();
        var col = Math.floor((e.clientX - rect.left) / dims.w);
        var row = Math.floor((e.clientY - rect.top)  / dims.h);
        var cur = term.buffer.active;
        if (row !== cur.cursorY) return;
        var dx = col - cur.cursorX;
        if (dx === 0) return;
        var pp2 = panes[s.id];
        if (!pp2 || !pp2.ws) return;
        e.preventDefault();
        sendCursorMove(pp2.ws, term, dx);
      } catch(_){}
    });
  })();
}

function addPane(s) {
  createPaneElement(s);
  var lane = s.lane || 'active';
  var target = (pendingSplitTarget && pendingSplitTarget.lane === lane)
    ? pendingSplitTarget.sid : getLastLeafSid(layoutTrees[lane]);
  var dir = (pendingSplitTarget && pendingSplitTarget.lane === lane)
    ? pendingSplitTarget.dir : 'h';
  pendingSplitTarget = null;
  var tree = addSidToTree(layoutTrees[lane], s.id, target, dir);
  saveLayoutTree(lane, tree);
  if (lane === currentTab) { if (zoomedSid) zoomedSid = null; rebuildCanvas(); }
  updateTabCounts();
}

function removePane(sid) {
  var p = panes[sid];
  if (p) {
    if (p.reconnectTimer) { clearTimeout(p.reconnectTimer); p.reconnectTimer = null; }
    try { p.ws.close(); } catch(_){}
    closeSearchBar(sid);
    delete searchCaseSensitive[sid];
    try { p.term.dispose(); } catch(_){}
    if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
    delete panes[sid];
  }
  ['active','pending','done'].forEach(function(lane) {
    saveLayoutTree(lane, removeFromTree(layoutTrees[lane], sid));
  });
  if (zoomedSid === sid) zoomedSid = null;
  rebuildCanvas();
  updateEmpty();
}

function updatePaneHead(sid) {
  var s = state[sid], p = panes[sid];
  if (!s || !p) return;
  var dot = p.el.querySelector('.dot');
  if (dot) dot.className = 'dot ' + s.status;
  p.el.dataset.status = s.status;
  var prevLane = p.el.dataset.lane;
  var newLane = s.lane || 'active';
  p.el.dataset.lane = newLane;
  if (prevLane !== newLane) {
    var oldTree = removeFromTree(layoutTrees[prevLane], sid);
    saveLayoutTree(prevLane, oldTree);
    var newTree = addSidToTree(layoutTrees[newLane], sid, getLastLeafSid(layoutTrees[newLane]), 'h');
    saveLayoutTree(newLane, newTree);
    if (prevLane === currentTab || newLane === currentTab) rebuildCanvas();
  }
  var btns = p.el.querySelectorAll('[data-lane-set]');
  btns.forEach(function(b) {
    if (b.dataset.laneSet === newLane) b.classList.add('on');
    else b.classList.remove('on');
  });
  updateTabCounts();
}

function updateTabCounts() {
  var c = { active:0, pending:0, done:0 };
  Object.values(state).forEach(function(s) { c[s.lane || 'active']++; });
  document.getElementById('cnt-active').textContent  = c.active;
  document.getElementById('cnt-pending').textContent = c.pending;
  document.getElementById('cnt-done').textContent    = c.done;
}

// Tab switcher
var currentTab = localStorage.getItem('currentTab') || 'active';
function switchTab(tab) {
  var _bb = document.getElementById('broadcast-bar');
  if (_bb && _bb.style.display !== 'none') { _bb.style.display = 'none'; document.getElementById('inp-broadcast').value = ''; }
  if (sessionFilter) { sessionFilter = ''; document.getElementById('inp-filter').value = ''; }
  currentTab = tab;
  localStorage.setItem('currentTab', tab);
  document.querySelectorAll('#tab-bar button').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  rebuildCanvas();
}
document.getElementById('tab-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-tab]');
  if (btn) switchTab(btn.dataset.tab);
});
switchTab(currentTab);

function updateEmpty() {
  var existing = document.getElementById('empty');
  var tree = layoutTrees[currentTab];
  var laneEmpty = !tree || getAllLeafSids(tree, []).length === 0;
  if (laneEmpty) {
    if (!existing) {
      var d = document.createElement('div');
      d.id = 'empty';
      d.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center';
      d.innerHTML = '<div><h2 style="color:var(--text);margin-bottom:6px;font-size:18px">No sessions yet</h2><p>Pick a project folder and click "+ New Session"</p><p style="font-size:11px;margin-top:12px;color:var(--muted)">Tip: use &#x229E; / &#x229F; on any pane header to split right or down</p></div>';
      document.getElementById('canvas').appendChild(d);
    }
  } else if (existing) existing.remove();
}
function hideEmpty() { var e = document.getElementById('empty'); if (e) e.remove(); }

function focusPane(sid) {
  var p = panes[sid];
  if (!p) return;
  setActiveSession(sid);
  try { p.term.focus(); } catch(_){}
}


function requestSplit(sid, dir) {
  var lane = state[sid] ? (state[sid].lane || 'active') : currentTab;
  pendingSplitTarget = { sid: sid, dir: dir, lane: lane };
  newSession();
}

document.getElementById('canvas').addEventListener('mousedown', function(e) {
  if (zoomedSid || sessionFilter) return;           // disabled in zoom / filter mode
  var head = e.target.closest('.pane-head');
  if (!head) return;
  if (e.target.closest('button') || e.target.closest('.lane-btns') || e.target.closest('[data-color-dot]') || e.target.closest('.nm') || e.target.closest('.tag-area')) return;
  var paneEl = head.closest('.pane');
  if (!paneEl) return;
  e.preventDefault();
  var sid = paneEl.id.replace('pane-', '');
  dragState.active = true;
  dragState.fromSid = sid;
  paneEl.classList.add('drag-source');
  document.body.classList.add('is-dragging');
});

document.getElementById('canvas').addEventListener('click', function(e) {
  var caseBtn = e.target.closest('[id^="search-case-"]');
  if (caseBtn) {
    e.stopPropagation();
    var sid = caseBtn.id.replace('search-case-', '');
    if (!searchCaseSensitive[sid]) searchCaseSensitive[sid] = false;
    searchCaseSensitive[sid] = !searchCaseSensitive[sid];
    caseBtn.classList.toggle('active', searchCaseSensitive[sid]);
    runSearch(sid);
    return;
  }
  var tagBtn = e.target.closest('[data-tag-btn]');
  if (tagBtn) { e.stopPropagation(); showTagEditor(tagBtn.dataset.tagBtn, tagBtn); return; }
  var exportBtn = e.target.closest('[data-export]');
  if (exportBtn) { exportTerminal(exportBtn.dataset.export); return; }
  var noteBtn = e.target.closest('[data-note]');
  if (noteBtn) { e.stopPropagation(); showNoteEditor(noteBtn.dataset.note, noteBtn); return; }
  var colorDot = e.target.closest('[data-color-dot]');
  if (colorDot) { e.stopPropagation(); showColorPicker(colorDot.dataset.colorDot, colorDot); return; }
  var zoomBtn = e.target.closest('[data-zoom]');
  if (zoomBtn) { toggleZoom(zoomBtn.dataset.zoom); return; }
  var splitH = e.target.closest('[data-split-h]');
  if (splitH) { requestSplit(splitH.dataset.splitH, 'h'); return; }
  var splitV = e.target.closest('[data-split-v]');
  if (splitV) { requestSplit(splitV.dataset.splitV, 'v'); return; }
  var killBtn = e.target.closest('[data-kill]');
  if (killBtn) { fetch('/api/sessions/' + killBtn.dataset.kill + '/kill', { method:'POST' }); return; }
  var resBtn = e.target.closest('[data-resume]');
  if (resBtn) { fetch('/api/sessions/' + resBtn.dataset.resume + '/resume', { method:'POST' }); return; }
  var laneBtn = e.target.closest('[data-lane-set]');
  if (laneBtn) {
    fetch('/api/sessions/' + laneBtn.dataset.sid + '/lane', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ lane: laneBtn.dataset.laneSet }),
    });
    return;
  }
  var folderBtn = e.target.closest('[data-folder]');
  if (folderBtn) { showFolderPopup(folderBtn.dataset.folder, folderBtn); return; }
  var rmBtn = e.target.closest('[data-remove]');
  if (rmBtn) {
    if (!confirm('Permanently delete this session? (History will be lost)')) return;
    fetch('/api/sessions/' + rmBtn.dataset.remove, { method:'DELETE' }); return;
  }
  var nm = e.target.closest('.nm');
  if (nm && !nm.querySelector('input')) {
    e.stopPropagation();
    var sid = nm.closest('.pane').id.replace('pane-', '');
    startInlineRename(nm, sid);
    return;
  }
  var pane = e.target.closest('.pane');
  if (pane) focusPane(pane.id.replace('pane-', ''));
});

function startInlineRename(nmEl, sid) {
  var oldName = state[sid] ? state[sid].name : '';
  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'nm-input';
  input.value = oldName;
  nmEl.innerHTML = '';
  nmEl.appendChild(input);
  input.focus();
  input.select();
  function commit() {
    var newName = input.value.trim() || oldName;
    nmEl.textContent = newName;
    if (newName !== oldName) {
      fetch('/api/sessions/' + sid + '/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: newName }),
      });
    }
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { nmEl.textContent = oldName; }
  });
  input.addEventListener('mousedown', function(e) { e.stopPropagation(); });
}

document.getElementById('canvas').addEventListener('keydown', function(e) {
  var inp = e.target;
  if (!inp || !inp.id || inp.id.indexOf('search-inp-') !== 0) return;
  var sid = inp.id.replace('search-inp-', '');
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); searchNext(sid); }
  else if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); searchPrev(sid); }
  else if (e.key === 'Escape') { e.preventDefault(); closeSearchBar(sid); }
  else if (e.altKey && (e.key === 'c' || e.key === 'C')) {
    e.preventDefault();
    if (!searchCaseSensitive[sid]) searchCaseSensitive[sid] = false;
    searchCaseSensitive[sid] = !searchCaseSensitive[sid];
    var btn = document.getElementById('search-case-' + sid);
    if (btn) btn.classList.toggle('active', searchCaseSensitive[sid]);
    runSearch(sid);
  }
});
document.getElementById('canvas').addEventListener('input', function(e) {
  var inp = e.target;
  if (!inp || !inp.id || inp.id.indexOf('search-inp-') !== 0) return;
  var sid = inp.id.replace('search-inp-', '');
  runSearch(sid);
});

window.addEventListener('resize', function() {
  ['active','pending','done'].forEach(function(lane) {
    fitSubtree(layoutTrees[lane]);
  });
});

function toggleZoom(sid) {
  zoomedSid = (zoomedSid === sid) ? null : sid;
  rebuildCanvas();
}

function applyPaneColor(sid) {
  var p = panes[sid];
  if (!p) return;
  var dot = p.el.querySelector('.dot');
  if (!dot) return;
  var c = paneColors[sid];
  if (c) { dot.style.background = c; dot.style.boxShadow = '0 0 8px ' + c; dot.style.animation = 'none'; }
  else   { dot.style.background = ''; dot.style.boxShadow = ''; dot.style.animation = ''; }
}

function showColorPicker(sid, anchorEl) {
  var existing = document.getElementById('color-picker-pop');
  if (existing) { existing.remove(); return; }
  var pop = document.createElement('div');
  pop.id = 'color-picker-pop';
  var openedAt = Date.now();
  var dismiss;
  COLOR_PALETTE.forEach(function(c) {
    var sw = document.createElement('div');
    sw.className = 'cp-swatch' + (!c ? ' clear' : '');
    sw.style.background = c || 'transparent';
    sw.style.borderColor = c || '';
    if (!c) sw.textContent = '×';
    sw.title = c || 'Default';
    sw.addEventListener('click', function() {
      if (c) paneColors[sid] = c; else delete paneColors[sid];
      localStorage.setItem('claude-hub-colors', JSON.stringify(paneColors));
      applyPaneColor(sid);
      document.removeEventListener('mousedown', dismiss);
      pop.remove();
    });
    pop.appendChild(sw);
  });
  document.body.appendChild(pop);
  var rect = anchorEl.getBoundingClientRect();
  var pw = pop.offsetWidth, ph = pop.offsetHeight;
  var left = Math.min(rect.left, window.innerWidth - pw - 8);
  var top = rect.bottom + 6;
  if (top + ph > window.innerHeight) top = rect.top - ph - 6;
  pop.style.left = Math.max(0, left) + 'px';
  pop.style.top  = Math.max(0, top)  + 'px';
  dismiss = function(ev) {
    if (Date.now() - openedAt < 100) return;
    if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('mousedown', dismiss); }
  };
  setTimeout(function() { document.addEventListener('mousedown', dismiss); }, 0);
}

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(_) { return null; }
  }
  if (audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch(_){} }
  return audioCtx;
}

function beep(freq, type, durMs, gainPeak, startOffsetMs) {
  var ctx = ensureAudio();
  if (!ctx) return;
  var t0 = ctx.currentTime + (startOffsetMs || 0) / 1000;
  var dur = durMs / 1000;
  try {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(gainPeak, t0 + 0.01);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  } catch(_){}
}

function playNotifySound(kind) {
  if (kind === 'idle') {
    beep(600, 'sine', 80, 0.08, 0);
  } else if (kind === 'done') {
    beep(880, 'triangle', 100, 0.15, 0);
    beep(660, 'triangle', 100, 0.15, 130);
  }
}

function notifySessionChange(sid, newStatus) {
  if (!notifyEnabled) return;
  var s = state[sid];
  if (!s) return;
  var title;
  if (newStatus === 'idle') title = '⏸ Session idle';
  else if (newStatus === 'done') title = '✓ Session done';
  else return;
  var sname = s.name || sid;
  var body = sname + (s.cwd ? '\n' + s.cwd : '');
  toast(title + ' — ' + sname);
  playNotifySound(newStatus);
  if (document.hidden && 'Notification' in window && Notification.permission === 'granted') {
    try { new Notification(title, { body: body, tag: 'claude-hub-' + sid }); } catch(_){}
  }
}

function updateNotifyBtn() {
  var btn = document.getElementById('btn-notify');
  if (!btn) return;
  btn.style.color = notifyEnabled ? 'var(--orange)' : '';
  btn.title = notifyEnabled ? 'Notifications on' : 'Notifications off';
}

function toggleNotifications() {
  if (notifyEnabled) {
    notifyEnabled = false;
    localStorage.setItem('claude-hub-notify', 'off');
    updateNotifyBtn();
    return;
  }
  ensureAudio();
  function turnOn() {
    notifyEnabled = true;
    localStorage.setItem('claude-hub-notify', 'on');
    updateNotifyBtn();
  }
  if ('Notification' in window && Notification.permission === 'default') {
    try {
      var p = Notification.requestPermission(function() { turnOn(); });
      if (p && typeof p.then === 'function') { p.then(function() { turnOn(); }); }
    } catch(_) { turnOn(); }
  } else {
    turnOn();
  }
}

function getCellSize(term) {
  try {
    var c = term._core._renderService.dimensions.css.cell;
    if (c && c.width > 0 && c.height > 0) return { w: c.width, h: c.height };
  } catch(_){}
  try {
    var row = term.element && term.element.querySelector('.xterm-rows > div');
    if (row) {
      var r = row.getBoundingClientRect();
      var len = term.cols || 80;
      if (r.width > 0 && r.height > 0) return { w: r.width / len, h: r.height };
    }
  } catch(_){}
  return null;
}

function sendCursorMove(ws, term, dx) {
  if (!ws || ws.readyState !== 1 || !dx) return;
  var n = Math.abs(dx);
  if (n > 200) return;
  var appMode = false;
  try { appMode = !!term.modes.applicationCursorKeysMode; } catch(_){}
  var seq = dx < 0
    ? (appMode ? '\x1bOD' : '\x1b[D')
    : (appMode ? '\x1bOC' : '\x1b[C');
  var out = '';
  for (var i = 0; i < n; i++) out += seq;
  ws.send(out);
}

function toggleBroadcast() {
  var bar = document.getElementById('broadcast-bar');
  var inp = document.getElementById('inp-broadcast');
  var visible = bar.style.display !== 'none';
  if (visible) {
    bar.style.display = 'none';
    inp.value = '';
  } else {
    bar.style.display = 'flex';
    setTimeout(function() { inp.focus(); }, 50);
  }
}

function sendBroadcast(cmd) {
  if (!cmd) return;
  var count = 0;
  Object.keys(panes).forEach(function(sid) {
    var p = panes[sid];
    var s = state[sid];
    if (p && s && s.status === 'running' && p.ws && p.ws.readyState === 1) {
      p.ws.send(cmd + '\r');
      count++;
    }
  });
  if (count === 0) {
    toast('No running sessions to broadcast to');
  } else {
    toast('Sent to ' + count + ' running session' + (count !== 1 ? 's' : ''));
  }

function exportTerminal(sid) {
  var p = panes[sid];
  if (!p || !p.opened) { toast('Terminal not yet opened'); return; }
  var lines = [];
  var buf = p.term.buffer.active;
  // buf.length = full active buffer including scrollback (intentional — exports all content)
  for (var i = 0; i < buf.length; i++) {
    var line = buf.getLine(i);
    if (line) lines.push(line.translateToString(true));
  }
  while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
  var text = lines.join('\n');
  if (!text) { toast('Nothing to export (buffer is empty)'); return; }
  var s = state[sid];
  var safeName = (s ? s.name : sid).replace(/[^a-z0-9_\-]/gi, '_');
  var filename = safeName + '-' + Date.now() + '.txt';
  var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  toast('Exported ' + lines.length + ' lines → ' + filename);
}

  var preset = layoutPresets[name];

  ['active', 'pending', 'done'].forEach(function(lane) {

    var validIds = Object.values(state)

function scheduleTermReconnect(sid) {
  var p = panes[sid];
  if (!p) return;
  var attempt = p.reconnectAttempt;
  if (attempt > TERM_RECONNECT_DELAYS.length) return; // safety: prevents infinite re-entry
  if (p.reconnectTimer) { clearTimeout(p.reconnectTimer); p.reconnectTimer = null; }
  if (attempt >= TERM_RECONNECT_DELAYS.length) {
    showTermOverlay(sid, 'Disconnected', true);
    return;
  }
  var delay = TERM_RECONNECT_DELAYS[attempt];
  p.reconnectAttempt++;
  showTermOverlay(sid, 'Reconnecting… (' + (delay / 1000) + 's)', false);
  p.reconnectTimer = setTimeout(function() { reconnectTerm(sid); }, delay);
}

function reconnectTerm(sid) {
  var p = panes[sid];
  if (!p) return;
  if (p.ws && (p.ws.readyState === 0 || p.ws.readyState === 1)) return;
  p.reconnectAttempt = 0;
  if (p.reconnectTimer) { clearTimeout(p.reconnectTimer); p.reconnectTimer = null; }
  var newWs = new WebSocket('ws://' + location.host + '/term/' + sid);
  newWs.binaryType = 'arraybuffer';
  newWs.onmessage = function(e) {
    if (e.data instanceof ArrayBuffer) p.term.write(new Uint8Array(e.data));
    else p.term.write(e.data);
  };
  newWs.onopen = function() {
    p.reconnectAttempt = 0;
    hideTermOverlay(sid);
    try { p.fit.fit(); newWs.send(JSON.stringify({ type:'resize', cols:p.term.cols, rows:p.term.rows })); } catch(_){}
  };
  newWs.onclose = function() { scheduleTermReconnect(sid); };
  newWs.onerror = function() { newWs.close(); };
  p.ws = newWs;
}

function buildBalancedTree(sids, dir) {
  if (sids.length === 0) return null;
  if (sids.length === 1) return { type: 'leaf', sessionId: sids[0] };
  var mid = Math.floor(sids.length / 2);
  var nextDir = dir === 'h' ? 'v' : 'h';
  return {
    type: 'split',
    dir: dir,
    ratio: 0.5,
    children: [
      buildBalancedTree(sids.slice(0, mid), nextDir),
      buildBalancedTree(sids.slice(mid), nextDir)
    ]
  };
}

function resetLayout() {
  var lane = currentTab;
  var sids = Object.values(state)
    .filter(function(s) { return (s.lane || 'active') === lane; })
    .map(function(s) { return s.id; });
  
  if (sids.length === 0) {
    layoutTrees[lane] = null;
  } else {
    sids.sort();
    layoutTrees[lane] = buildBalancedTree(sids, 'h');
  }
  saveLayoutTree(lane, layoutTrees[lane]);
  rebuildCanvas();
  setTimeout(function() {
    fitSubtree(layoutTrees[lane]);
  }, 100);
  toast('Layout reset to grid');
}

function killAll() {
  if (!confirm('Stop all sessions? (kept for Resume later)')) return;
  Object.values(state).forEach(function(s) {
    if (s.status === 'running') fetch('/api/sessions/' + s.id + '/kill', { method:'POST' });
  });
}

function resumeAll() {

}

function sbBrowse(p, silent) {
  if (!p) return;
  if (!silent && !sbNavigating) {
    if (sbHistoryIdx < sbHistory.length - 1) sbHistory = sbHistory.slice(0, sbHistoryIdx + 1);
    sbHistory.push(p);
    sbHistoryIdx = sbHistory.length - 1;
  }
  sbNavigating = false;
  sbUpdateNavButtons();
  sbCurrentPath = p;
  var pathInput = document.getElementById('sb-path-input');
  if (pathInput) pathInput.value = p;
  
  var listEl = document.getElementById('sb-list');
  fetch('/api/fs?files=1&path=' + encodeURIComponent(p))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { listEl.innerHTML = '<div class="sb-empty">' + esc(data.error) + '</div>'; return; }
      renderSbList(data.items || []);
    });
}

function sbUpdateNavButtons() {
  var b = document.getElementById('sb-back'), f = document.getElementById('sb-fwd');
  if (b) b.disabled = sbHistoryIdx <= 0;
  if (f) f.disabled = sbHistoryIdx >= sbHistory.length - 1;
}
function sbGoBack() { if (sbHistoryIdx > 0) { sbHistoryIdx--; sbNavigating = true; sbBrowse(sbHistory[sbHistoryIdx]); } }
function sbGoForward() { if (sbHistoryIdx < sbHistory.length - 1) { sbHistoryIdx++; sbNavigating = true; sbBrowse(sbHistory[sbHistoryIdx]); } }

    html += '<div class="sb-row" data-sb-up="' + esc(upPath) + '"><span class="sb-icon">&#x2B06;</span><span class="sb-name">.. (up)</span></div>';
  }

function handleCtxAction(act) {
  var t = ctxTarget;
  if (!t) return;

  if (act === 'open') {
    if (t.type === 'file') {
      fetch('/api/file-open', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path }) })
        .then(function(r){ return r.json(); }).then(function(j){ if (!j.ok) toast('Error: ' + j.error); });
    } else {
      sbBrowse(t.path);
    }
    return;
  }
  if (act === 'reveal') {
    fetch('/api/file-reveal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path }) })
      .then(function(r){ return r.json(); }).then(function(j){ if (!j.ok) toast('Error: ' + j.error); });
    return;
  }
  if (act === 'reveal-dir') {
    fetch('/api/open', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path, action:'explorer' }) })
      .then(function(r){ return r.json(); }).then(function(j){ if (!j.ok) toast('Error: ' + j.error); });
    return;
  }
  if (act === 'vscode') {
    fetch('/api/open', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path, action:'vscode' }) });
    return;
  }
  if (act === 'attach') {
    var cb = t.row && t.row.querySelector('input[type="checkbox"]');
    if (cb) { cb.checked = !cb.checked; sbToggleFile(t.path, t.name, cb.checked, t.type); t.row.classList.toggle('checked', cb.checked); }
    return;
  }
  if (act === 'copy-path') {
    navigator.clipboard.writeText(t.path).then(function(){ toast('Path copied'); });
    return;
  }
  if (act === 'rename') {
    startInlineFileRename(t);
    return;
  }
  if (act === 'duplicate') {
    fetch('/api/file-duplicate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path }) })
      .then(function(r){ return r.json(); }).then(function(j){ if (j.ok) { toast('Duplicated'); sbRefresh(); } else toast('Error: ' + j.error); });
    return;
  }
  if (act === 'delete') {
    if (!confirm('Delete "' + t.name + '" to Recycle Bin?')) return;
    fetch('/api/file-delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: t.path }) })
      .then(function(r){ return r.json(); }).then(function(j){ if (j.ok) { if (activeSid && sbSelected[activeSid]) delete sbSelected[activeSid][t.path]; sbUpdateSelectedCount(); toast('Moved to Recycle Bin'); sbRefresh(); } else toast('Error: ' + j.error); });
    return;
  }
  if (act === 'new-file' || act === 'new-folder') {
    var parent = t.isCurrent ? sbCurrentPath : (t.type === 'dir' ? t.path : sbCurrentPath);
    var name = prompt(act === 'new-file' ? 'New file name:' : 'New folder name:', act === 'new-file' ? 'untitled.txt' : 'new-folder');
    if (!name) return;
    fetch('/api/file-new', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ parent: parent, name: name, type: act === 'new-file' ? 'file' : 'dir' }),
    }).then(function(r){ return r.json(); }).then(function(j){ if (j.ok) { toast('Created ' + name); sbRefresh(); } else toast('Error: ' + j.error); });
    return;
  }
  if (act === 'new-session') {
    fetch('/api/sessions', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cwd: t.path, autoAccept: document.getElementById('chk-auto').checked, engine: document.getElementById('sel-engine').value }),
    }).then(function(){ toast('Created session: ' + t.name); });
  }
}

function startInlineFileRename(t) {
  if (!t.row) return;
  var nameEl = t.row.querySelector('.sb-name');
  if (!nameEl) return;
  var oldHtml = nameEl.innerHTML;
  var input = document.createElement('input');
  input.type = 'text';
  input.className = 'sb-rename';
  input.value = t.name;
  nameEl.replaceWith(input);
  input.focus();
  input.select();
  var done = false;
  function cleanup(newSpan) {
    if (done) return;
    done = true;
    input.replaceWith(newSpan);
  }
  function restore() {
    var span = document.createElement('span');
    span.className = 'sb-name';
    span.innerHTML = oldHtml;
    cleanup(span);
  }
  function save() {
    var newName = input.value.trim();
    if (!newName || newName === t.name) { restore(); return; }
    fetch('/api/file-rename', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ path: t.path, newName: newName }),
    }).then(function(r){ return r.json(); }).then(function(j){ if (j.ok) { toast('Renamed'); sbRefresh(); } else { toast('Error: ' + j.error); restore(); } });
  }
  input.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') { ev.preventDefault(); save(); }
    else if (ev.key === 'Escape') { ev.preventDefault(); restore(); }
  });
  input.addEventListener('blur', save);
}

function showFolderPopup(sid, anchorBtn) {
  var s = state[sid];
  if (!s) return;
  var pop = document.getElementById('folder-pop');
  if (!pop) return;
  var fullPath = s.cwd || '';
  var BS = String.fromCharCode(92);
  var parts = fullPath.split(/[\\/]/).filter(Boolean);
  var crumbHtml = '';
  var accum = '';
  parts.forEach(function(part, i) {
    if (i === 0 && /^[A-Za-z]:$/.test(part)) accum = part + BS;
    else accum = accum + (accum.endsWith(BS) ? '' : BS) + part;
    if (i > 0) crumbHtml += '<span class="sep">?</span>';
    crumbHtml += '<span data-crumb="' + esc(accum) + '" title="Open in Explorer">' + esc(part) + '</span>';
  });
  pop.innerHTML =
    '<div class="fp-path">' + esc(fullPath) + '</div>' +
    '<div class="fp-crumb">' + crumbHtml + '</div>' +
    '<div class="fp-acts">' +
      '<button data-act="explorer">&#x1F4C2; Explorer</button>' +
      '<button data-act="copy">&#x1F4CB; Copy path</button>' +
      '<button data-act="vscode">&#x1F4BB; VSCode</button>' +
      '<button data-act="cmd">&#x1F5A5; CMD</button>' +
    '</div>';
  pop.dataset.path = fullPath;
  var r = anchorBtn.getBoundingClientRect();
  pop.classList.add('show');
  var pw = pop.offsetWidth, ph = pop.offsetHeight;
  var left = Math.min(r.left, window.innerWidth - pw - 12);
  var top = r.bottom + 6;
  if (top + ph > window.innerHeight - 12) top = Math.max(12, r.top - ph - 6);
  pop.style.left = Math.max(12, left) + 'px';
  pop.style.top = top + 'px';
}

  var pop = document.getElementById('folder-pop');

function sbUpdateSelectedCount() {
  var count = activeSid && sbSelected[activeSid] ? Object.keys(sbSelected[activeSid]).length : 0;
  var countEl = document.getElementById('sb-sel-count');
  var btn = document.getElementById('sb-delete-selected');
  if (countEl) countEl.textContent = count;
  if (btn) btn.disabled = count === 0;
}

function sbToggleFile(filePath, fileName, checked, itemType) {
  if (!activeSid) { toast('Click a terminal first'); return; }
  var s = state[activeSid], p = panes[activeSid];
  if (!s) return;
  sbSelected[activeSid] = sbSelected[activeSid] || {};
  var rel = relOrAbs(filePath, s.cwd);
  var ref = /\s/.test(rel) ? '"' + rel + '"' : rel;
  var token = '@' + ref + ' ';
  if (checked) {
    sbSelected[activeSid][filePath] = { name: fileName, type: itemType || 'file', token: token };
    if (p && p.ws && p.ws.readyState === 1 && itemType !== 'dir') p.ws.send(token);
  } else {
    var prev = sbSelected[activeSid][filePath];
    delete sbSelected[activeSid][filePath];
    if (p && p.ws && p.ws.readyState === 1 && (!prev || prev.type !== 'dir')) p.ws.send('\x7f'.repeat((prev && prev.token || token).length));
  }
  sbUpdateSelectedCount();
  sbRefresh();
}

function sbDeleteSelected() {
  if (!activeSid || !sbSelected[activeSid]) { toast('No selected files'); return; }
  var paths = Object.keys(sbSelected[activeSid]);
  if (!paths.length) { toast('No selected files'); return; }
  if (!confirm('Delete ' + paths.length + ' selected item(s) to Recycle Bin?')) return;
  fetch('/api/files-delete', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ paths: paths }),
  }).then(function(r){ return r.json(); }).then(function(j){
    if (j.ok) {
      sbSelected[activeSid] = {};
      sbUpdateSelectedCount();
      toast('Moved ' + j.count + ' item(s) to Recycle Bin');
      sbRefresh();
    } else {
      toast('Delete error: ' + (j.error || 'unknown'));
    }
  }).catch(function(e){ toast('Delete error: ' + e.message); });
}

function relOrAbs(filePath, sessionCwd) {
  var BS = String.fromCharCode(92);
  var fp = filePath.split(BS).join('/').toLowerCase();
  var cw = sessionCwd.split(BS).join('/').toLowerCase();
  if (!cw.endsWith('/')) cw += '/';
  if (fp.startsWith(cw)) return filePath.substring(sessionCwd.length + 1);
  return filePath;
}

function setActiveSession(sid) {
  if (!sid || !state[sid]) return;
  activeSid = sid;
  document.querySelectorAll('.pane').forEach(function(el) { el.classList.remove('active-pane'); });
  var p = panes[sid];
  if (p) {
    p.el.classList.add('active-pane');
    sbBrowse(state[sid].cwd);
  }
}

// Global paste → forward clipboard to active session PTY (text + image)
document.addEventListener('paste', function(e) {
  var tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (!activeSid) return;
  var p = panes[activeSid];
  if (!p || p.ws.readyState !== 1) return;

  var items = (e.clipboardData || window.clipboardData).items;
  if (items) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') !== -1) {
        e.preventDefault();
        var blob = items[i].getAsFile();
        var reader = new FileReader();
        reader.onload = function() {
          var s = state[activeSid];
          fetch('/api/paste-image', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ data: reader.result, cwd: s ? s.cwd : '' })
          }).then(function(r){return r.json();}).then(function(j) {
            if (j.ok) { p.ws.send('@' + j.path + ' '); toast('Pasted image: ' + j.name); }
            else toast('Image paste error: ' + (j.error||''));
          });
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
  }

  var text = (e.clipboardData || window.clipboardData).getData('text');
  if (!text) return;
  var CR = String.fromCharCode(13), LF = String.fromCharCode(10);
  text = text.split(CR + LF).join(LF).split(CR).join(LF);
  p.ws.send(text);
  e.preventDefault();
});

// ── Toast ─────────────────────────────────────────────────────────
var toastTimer;
function toast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Apply saved theme on load
applyTheme(currentTheme);

document.getElementById('btn-font-size').textContent = termFontSize + 'px';
document.addEventListener('keydown', function(kbEv) {
  var tag = document.activeElement ? document.activeElement.tagName : '';
  if ((tag === 'INPUT' || tag === 'TEXTAREA') && !document.activeElement.closest('.xterm')) return;

  if (kbEv.ctrlKey && kbEv.shiftKey && kbEv.key === 'N') {
    kbEv.preventDefault();
    newSession();
    return;
  }
  if (kbEv.ctrlKey && kbEv.shiftKey && kbEv.key === 'W') {
    kbEv.preventDefault();
    var active = document.querySelector('.pane.active');
    if (active) {
      var sid = active.id.replace('pane-', '');
      var sName = state[sid] ? state[sid].name : sid;
      if (confirm('Close session "' + sName + '"?')) {
        fetch('/api/sessions/' + sid, { method: 'DELETE' });
      }
    }
    return;
  }
  var kbLanes = ['active', 'pending', 'done'];
  if (kbEv.ctrlKey && kbEv.shiftKey && kbEv.key === ']') {
    kbEv.preventDefault();
    switchTab(kbLanes[(kbLanes.indexOf(currentTab) + 1) % 3]);
    return;
  }
  if (kbEv.ctrlKey && kbEv.shiftKey && kbEv.key === '[') {
    kbEv.preventDefault();
    switchTab(kbLanes[(kbLanes.indexOf(currentTab) + 2) % 3]);
    return;
  }
});

updateNotifyBtn();
connectCtrl();
</script>
